<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamento</title>

    <link rel="stylesheet" href="estacionamento.css">
</head>
<body>
    <header>
        <h1>
            Sistema de Tarifação de Estacionamento
        </h1>
    </header>

    <main>
        <section>
            <label for="inputEntrada">Data e Hora de Entrada (Check-in):</label>
            <input type="datetime-local" id="inputEntrada">
            <br>
            <label for="inputSaida">Data e Hora de Saída (Check-out):</label>
            <input type="datetime-local" id="inputSaida">
            <br>
            <label for="inputGrande">Veículo de grande porte (Adicional 25%)</label>
            <input type="checkbox" id="inputGrande">
            <br>
            <label for="inputFrequente">Cliente frequente (Desconto 5%)</label>
            <input type="checkbox" id="inputFrequente">
            <br><br>
            <button onclick="Calcular()">Calcular</button>
            <br><br>
            <label for="spanTempo">Tempo total cobrado: </label>
            <span id="spanTempo"></span>
            <br>
            <label for="spanValor">Valor Total: </label>
            <span id="spanValor"></span>
        </section>
    </main>

    <footer> </footer>

    <script src="estacionamento.js"></script>
</body>
</html>
